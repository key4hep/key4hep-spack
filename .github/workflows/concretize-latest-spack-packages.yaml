name: Concretize latest spack-packages
description: |
    This workflow uses the latest tag of Spack together with the
    develop branch of spack-packages and tries to concretize.
    It may fail if there are requirements (for example in key4hep-common/packages.yaml)
    that are not yet in spack-packages

on:
  push:
    branches:
    - main
  pull_request:
  workflow_dispatch:

jobs:
  concretize-latest-spack-packages:
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.image }}
      cancel-in-progress: true
    strategy:
      matrix:
        image: [alma9, ubuntu24]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/key4hep/key4hep-images/${{ matrix.image }}-cvmfs
      options: --privileged
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7
      - name: Set up cvmfs
        run: /mount.sh
      - name: Setup environment and concretize
        env:
          KEY4HEP_SPACK_ROOT: ${{ github.workspace }}
        run: |
            ${KEY4HEP_SPACK_ROOT}/.github/scripts/concretize-tag-spack.sh
